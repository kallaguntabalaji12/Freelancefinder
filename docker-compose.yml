version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "6001:6001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/Freelancing
      - PORT=6001
    depends_on:
      - mongo

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongo-data:
